<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootHold</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel standalone (JSX transpilation) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background-color: #F4EFE6; }

    /* ── Scroll-triggered fade-in ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        transform 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Staggered delay helpers ── */
    .delay-0   { transition-delay: 0ms; }
    .delay-100 { transition-delay: 100ms; }
    .delay-200 { transition-delay: 200ms; }
    .delay-300 { transition-delay: 300ms; }
    .delay-400 { transition-delay: 400ms; }

    /* ── Header entrance ── */
    @keyframes headerDrift {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-enter {
      animation: headerDrift 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* ── Live date pulse (subtle tick on minute change) ── */
    @keyframes dateTick {
      0%   { opacity: 1; }
      20%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
    .date-tick { animation: dateTick 0.6s ease-out; }

    /* ── Perspective cards ── */
    .p-card {
      border: 1px solid #E0D9CE;
      background: rgba(255, 255, 255, 0.45);
      transition:
        transform  0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        border-color 0.45s ease;
    }
    .p-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.09);
      border-color: #8B6D3F;
    }
    .p-card-bar {
      width: 30px; height: 2px;
      background: #C8BFB0;
      margin-bottom: 24px;
      transition: background-color 0.4s ease;
    }
    .p-card:hover .p-card-bar { background: #8B6D3F; }

    .p-card-cta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 22px;
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .p-card:hover .p-card-cta { opacity: 1; transform: translateX(0); }

    /* ── Email input ── */
    .email-field {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid #C8BFB0;
      border-right: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: #1A1A1A;
      font-weight: 300;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .email-field::placeholder { color: #A0987E; }
    .email-field:focus { border-color: #8B6D3F; }

    /* ── CTA button ── */
    .cta-btn {
      padding: 14px 30px;
      background: #1A1A1A;
      color: #F4EFE6;
      border: 1px solid #1A1A1A;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.35s ease, border-color 0.35s ease;
    }
    .cta-btn:hover { background-color: #8B6D3F; border-color: #8B6D3F; }

    /* ── Responsive ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 640px) {
      .cards-grid   { grid-template-columns: 1fr; }
      .hero-cols    { grid-template-columns: 1fr !important; gap: 36px !important; }
      .section-pad  { padding-left: 24px !important; padding-right: 24px !important; }
      .footer-inner { flex-direction: column !important; gap: 48px !important; }
      .footer-brand { text-align: left !important; }
      .header-inner { padding: 20px 24px !important; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─────────────────────────────────────────
       Live clock — updates every second,
       exposes formatted date + time strings.
    ───────────────────────────────────────── */
    function useLiveClock() {
      const [now, setNow] = useState(() => new Date());
      const [ticked, setTicked] = useState(false);
      const prevMinute = useRef(now.getMinutes());

      useEffect(() => {
        const id = setInterval(() => {
          const next = new Date();
          // Trigger the CSS "tick" animation on each new minute
          if (next.getMinutes() !== prevMinute.current) {
            prevMinute.current = next.getMinutes();
            setTicked(true);
            setTimeout(() => setTicked(false), 700);
          }
          setNow(next);
        }, 1000);
        return () => clearInterval(id);
      }, []);

      // Editorial date:  "March 29, 2026"
      const dateLabel = now.toLocaleDateString('en-US', {
        month: 'long',
        day:   'numeric',
        year:  'numeric',
      }).toUpperCase();

      // Live time:  "14:07"
      const timeLabel = now.toLocaleTimeString('en-US', {
        hour:   '2-digit',
        minute: '2-digit',
        hour12: false,
      });

      return { dateLabel, timeLabel, ticked };
    }

    /* ─────────────────────────────────────────
       Reveal hook — Intersection Observer
    ───────────────────────────────────────── */
    function useReveal() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); }
          },
          { threshold: 0.08, rootMargin: '-20px 0px' }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ─────────────────────────────────────────
       Reveal wrapper
    ───────────────────────────────────────── */
    const Reveal = ({ children, delay = 'delay-0', style = {}, className = '' }) => {
      const ref = useReveal();
      return (
        <div ref={ref} className={`reveal ${delay} ${className}`} style={style}>
          {children}
        </div>
      );
    };

    /* ─────────────────────────────────────────
       Perspective card
    ───────────────────────────────────────── */
    const PerspectiveCard = ({ title, description, delay }) => {
      const ref = useReveal();
      return (
        <div ref={ref} className={`p-card reveal ${delay}`} style={{ padding: '36px 32px' }}>
          <div className="p-card-bar" />
          <h3 style={{
            fontFamily: "'Playfair Display', serif",
            fontSize: '1.15rem', fontWeight: 500,
            color: '#1A1A1A', marginBottom: '14px',
            letterSpacing: '-0.01em', lineHeight: 1.35,
          }}>
            {title}
          </h3>
          <p style={{
            fontFamily: "'Inter', sans-serif",
            fontSize: '0.875rem', color: '#6A6560',
            lineHeight: 1.8, fontWeight: 300,
          }}>
            {description}
          </p>
          <div className="p-card-cta">
            <span style={{
              fontFamily: "'Inter', sans-serif",
              fontSize: '0.68rem', color: '#8B6D3F',
              letterSpacing: '0.16em', textTransform: 'uppercase',
            }}>Explore</span>
            <span style={{ color: '#8B6D3F', fontSize: '0.8rem' }}>→</span>
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────
       Data
    ───────────────────────────────────────── */
    const perspectives = [
      {
        title: 'Autonomous Commerce',
        description: 'The emergence of self-governing commercial ecosystems where algorithmic intelligence and human discretion converge to create markets of unprecedented resilience and efficiency.',
      },
      {
        title: 'Nutrient-Dense Supply Chains',
        description: 'Reimagining the architecture of food systems from extraction to elevation — supply chains that preserve nutritional integrity while honoring the sovereignty of the producer.',
      },
      {
        title: 'Strategic Governance',
        description: 'Beyond compliance. The disciplined art of designing institutional frameworks that align incentives, distribute authority, and cultivate the conditions for enduring excellence.',
      },
      {
        title: 'Institutional Capital',
        description: 'Capital as covenant. Exploring the formation of patient, purpose-driven financial instruments designed to sustain generational ambition rather than quarterly appetite.',
      },
    ];

    const cardDelays = ['delay-0', 'delay-100', 'delay-200', 'delay-300'];

    /* ─────────────────────────────────────────
       App
    ───────────────────────────────────────── */
    const App = () => {
      const { dateLabel, timeLabel, ticked } = useLiveClock();
      const [email, setEmail]     = useState('');
      const [submitted, setSubmit] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (email.trim()) { setSubmit(true); setEmail(''); }
      };

      return (
        <div style={{ backgroundColor: '#F4EFE6', minHeight: '100vh' }}>

          {/* ══════════════ HEADER ══════════════ */}
          <header
            className="header-enter header-inner"
            style={{
              position: 'sticky', top: 0, zIndex: 100,
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '24px 52px',
              borderBottom: '1px solid #E0D9CE',
              backgroundColor: 'rgba(244, 239, 230, 0.9)',
              backdropFilter: 'blur(14px)',
              WebkitBackdropFilter: 'blur(14px)',
            }}
          >
            {/* ── Live date + time ── */}
            <div
              className={ticked ? 'date-tick' : ''}
              style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 2 }}
            >
              <span style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: '0.6rem', letterSpacing: '0.2em',
                color: '#A0987E', textTransform: 'uppercase',
              }}>
                {dateLabel}
              </span>
              <span style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: '0.58rem', letterSpacing: '0.15em',
                color: '#C8BFB0',
              }}>
                {timeLabel}
              </span>
            </div>

            {/* ── Brand ── */}
            <span style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: '1rem', letterSpacing: '0.38em',
              color: '#1A1A1A', textTransform: 'uppercase', userSelect: 'none',
            }}>
              ROOTHOLD
            </span>

            {/* ── Right slot ── */}
            <span style={{
              fontFamily: "'Inter', sans-serif",
              fontSize: '0.62rem', letterSpacing: '0.22em',
              color: '#A0987E', textTransform: 'uppercase',
            }}>
              Est. MMXXVI
            </span>
          </header>

          {/* ══════════════ HERO ══════════════ */}
          <section className="section-pad" style={{
            maxWidth: 940, margin: '0 auto',
            padding: '116px 52px 100px',
            borderBottom: '1px solid #E0D9CE',
          }}>
            <Reveal delay="delay-0">
              <div style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: '0.62rem', letterSpacing: '0.32em',
                color: '#8B6D3F', textTransform: 'uppercase', marginBottom: '52px',
              }}>Thesis</div>
            </Reveal>

            <Reveal delay="delay-100">
              <h1 style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 'clamp(2.8rem, 7vw, 5.5rem)',
                fontWeight: 400, fontStyle: 'italic',
                color: '#1A1A1A', lineHeight: 1.1,
                letterSpacing: '-0.025em', marginBottom: '72px',
              }}>
                The Architecture<br />of Legacy.
              </h1>
            </Reveal>

            <div className="hero-cols" style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr',
              gap: '60px', alignItems: 'start',
            }}>
              <Reveal delay="delay-200">
                <p style={{
                  fontFamily: "'Inter', sans-serif",
                  fontSize: '0.9375rem', color: '#4A4A4A',
                  lineHeight: 1.9, fontWeight: 300,
                }}>
                  We are witnessing the quiet dissolution of institutions that were never designed
                  to last. RootHold exists at the intersection of endurance and innovation — a space
                  for those who understand that lasting value is not built on quarterly cycles, but
                  on the patient compounding of principled decisions.
                </p>
              </Reveal>

              <div>
                <Reveal delay="delay-300">
                  <p style={{
                    fontFamily: "'Inter', sans-serif",
                    fontSize: '0.9375rem', color: '#4A4A4A',
                    lineHeight: 1.9, fontWeight: 300, marginBottom: '36px',
                  }}>
                    Our perspectives are drawn from the margins of conventional discourse — from
                    operators, founders, stewards, and scholars who have chosen depth over velocity.
                    We do not optimize for virality. We curate for permanence.
                  </p>
                </Reveal>
                <Reveal delay="delay-400">
                  <p style={{
                    fontFamily: "'Inter', sans-serif",
                    fontSize: '0.9375rem', color: '#4A4A4A',
                    lineHeight: 1.9, fontWeight: 300,
                  }}>
                    What remains when the noise recedes? Structure. Intention. The quiet authority
                    of systems built to hold. This is the inquiry that animates everything published
                    here — an ongoing investigation into the conditions that allow great things to endure.
                  </p>
                </Reveal>
              </div>
            </div>
          </section>

          {/* ══════════════ SECTION RULE ══════════════ */}
          <Reveal>
            <div className="section-pad" style={{
              maxWidth: 940, margin: '0 auto',
              padding: '68px 52px 48px',
              display: 'flex', alignItems: 'center', gap: '28px',
            }}>
              <div style={{ flex: 1, height: 1, background: '#E0D9CE' }} />
              <span style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: '0.6rem', letterSpacing: '0.3em',
                color: '#A0987E', textTransform: 'uppercase', whiteSpace: 'nowrap',
              }}>Featured Perspectives</span>
              <div style={{ flex: 1, height: 1, background: '#E0D9CE' }} />
            </div>
          </Reveal>

          {/* ══════════════ CARDS ══════════════ */}
          <section className="section-pad" style={{
            maxWidth: 940, margin: '0 auto', padding: '0 52px 128px',
          }}>
            <div className="cards-grid">
              {perspectives.map((p, i) => (
                <PerspectiveCard
                  key={p.title}
                  title={p.title}
                  description={p.description}
                  delay={cardDelays[i]}
                />
              ))}
            </div>
          </section>

          {/* ══════════════ FOOTER ══════════════ */}
          <footer style={{ borderTop: '1px solid #E0D9CE', background: '#EDE7DA' }}>
            <div className="section-pad" style={{
              maxWidth: 940, margin: '0 auto', padding: '88px 52px 72px',
            }}>
              <Reveal>
                <div className="footer-inner" style={{
                  display: 'flex', justifyContent: 'space-between',
                  alignItems: 'flex-start', gap: '48px',
                }}>
                  <div style={{ maxWidth: 520, flex: 1 }}>
                    <div style={{
                      fontFamily: "'Inter', sans-serif",
                      fontSize: '0.62rem', letterSpacing: '0.32em',
                      color: '#8B6D3F', textTransform: 'uppercase', marginBottom: '24px',
                    }}>Access</div>

                    <h2 style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: '2.1rem', fontWeight: 400,
                      color: '#1A1A1A', lineHeight: 1.25,
                      letterSpacing: '-0.015em', marginBottom: '18px',
                    }}>
                      Join the Correspondence
                    </h2>

                    <p style={{
                      fontFamily: "'Inter', sans-serif",
                      fontSize: '0.875rem', color: '#6A6560',
                      lineHeight: 1.8, fontWeight: 300, marginBottom: '40px',
                    }}>
                      RootHold publishes for a considered readership. Submit your address to be
                      considered for access to extended perspectives and private correspondence.
                    </p>

                    {!submitted ? (
                      <form onSubmit={handleSubmit} style={{ display: 'flex' }}>
                        <input
                          type="email"
                          value={email}
                          onChange={(e) => setEmail(e.target.value)}
                          placeholder="your@address.com"
                          required
                          className="email-field"
                        />
                        <button type="submit" className="cta-btn">Request Entry</button>
                      </form>
                    ) : (
                      <div style={{
                        padding: '14px 0',
                        fontFamily: "'Playfair Display', serif",
                        fontStyle: 'italic', fontSize: '1rem',
                        color: '#8B6D3F', letterSpacing: '0.01em',
                      }}>
                        Your request has been received. We will be in correspondence.
                      </div>
                    )}
                  </div>

                  <div className="footer-brand" style={{ textAlign: 'right', paddingTop: 4 }}>
                    <div style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: '0.85rem', letterSpacing: '0.38em',
                      color: '#C8BFB0', textTransform: 'uppercase', marginBottom: 52,
                    }}>ROOTHOLD</div>
                    <div style={{
                      fontFamily: "'Inter', sans-serif",
                      fontSize: '0.62rem', color: '#A0987E', letterSpacing: '0.14em',
                    }}>© MMXXVI</div>
                  </div>
                </div>
              </Reveal>
            </div>
          </footer>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
